<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-commerce - Contacto</title>
</head>

<body>

  <header>
    <nav>
      <h1>Tienda Muebles</h1>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="Nosotros.html">Nosotros</a></li>
        <li><a href="Tienda.html">Tienda</a></li>
        <li><a href="Blog.html">Blog</a></li>
        <li><a href="Galeria.html">Galeria</a></li>
        <li><a href="Contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <h2>Contacto</h2>

    <form>

      <fieldset>
        <legend>Tus Datos</legend>

        <p>
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" placeholder="Tu Nombre">
        </p>

        <p>
          <label for="asunto">Asunto:</label>
          <input type="text" id="asunto" name="asunto" placeholder="Tu Asunto">
        </p>

        <p>
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" placeholder="Tu Email">
        </p>

        <p>
          <label for="telefono">Teléfono:</label>
          <input type="tel" id="telefono" name="telefono" placeholder="Tu Teléfono">
        </p>

        <p>
          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje"></textarea>
        </p>

      </fieldset>


      <fieldset>
        <legend>País</legend>

        <p>
          <label for="pais">Selecciona tu país:</label>
          <select name="pais" id="pais">
            <option value="">--Seleccionar--</option>
            <option value="mexico">México</option>
            <option value="peru">Perú</option>
            <option value="colombia">Colombia</option>
            <option value="argentina">Argentina</option>
            <option value="espana">España</option>
            <option value="chile">Chile</option>
          </select>
        </p>

      </fieldset>


      <fieldset>
        <legend>INFORMACIÓN EXTRA</legend>

        <p>
          <label>
            <input type="radio" name="tipo_usuario" value="cliente">
            Cliente
          </label>
        </p>

        <p>
          <label>
            <input type="radio" name="tipo_usuario" value="proveedor">
            Proveedor
          </label>
        </p>

        <p>
          <label for="categoria">Categoría de Interés:</label>
          <input type="text" id="categoria" name="categoria">
        </p>

      </fieldset>

      <p>
        <button type="submit">ENVIAR FORMULARIO</button>
      </p>

    </form>

  </main>

  <footer>
    <p>Todos los derechos Reservados, TiendaMuebles</p>
  </footer>

</body>

</html>
